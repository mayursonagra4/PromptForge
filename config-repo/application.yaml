eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    fetch-registry: true
    register-with-eureka: true
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 1.0
    export:
      zipkin:
        endpoint: http://localhost:9411/api/v2/spans

jwt:
  secret: PromptForge-jwt-secret-key-for-distributed-system-2026-secure-token-generation

app:
  security:
    internal-secret: pf-internal-secret-token-2026-very-secure-keys

spring:
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    username: postgres
    password: Mayur@2006
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

resilience4j:
  circuitbreaker:
    instances:
      default:
        registerWithEureka: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 5
  retry:
    instances:
      default:
        maxAttempts: 3
        waitDuration: 1s

logging:
  level:
    org.hibernate: WARN
    org.apache.kafka: WARN
  pattern:
    console: "%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %cyan([${spring.application.name:-},%X{traceId:-},%X{spanId:-}]) %yellow(%logger{15}) - %msg%n"
