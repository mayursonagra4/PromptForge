spring:
  application:
    name: intelligence-service
  cloud:
    config:
      discovery:
        enabled: true
        service-id: config-service
  config:
    import: "optional:configserver:"

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: ${OPENAI_BASE_URL}
      chat:
        options:
          model: ${OPENAI_MODEL}
          stream-usage: true